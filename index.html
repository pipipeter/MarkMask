<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkMask 码印 - 图片水印与马赛克工具</title>
  <meta name="description" content="MarkMask 码印 - 纯浏览器端图片安全工具，添加水印和马赛克，图片不离开您的设备。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='28' font-size='28'%3E🛡️%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- Mobile Warning -->
  <div id="mobile-warning" class="mobile-warning">
    <div class="mobile-warning-content">
      <div class="mobile-warning-icon">🖥️</div>
      <h2>请使用电脑浏览器</h2>
      <p>MarkMask 需要桌面浏览器以获得最佳体验</p>
    </div>
  </div>

  <!-- Top Bar -->
  <header id="topbar" class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <span class="logo-icon">◆</span>
        <span class="logo-text">MarkMask</span>
        <span class="logo-sub">码印</span>
      </div>
    </div>
    <div class="topbar-center">
      <span class="slogan">图片水印 & 隐私遮挡 · 一站搞定</span>
    </div>
    <div class="topbar-right">
      <div class="privacy-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>图片不上传 · 100% 本地处理</span>
      </div>
    </div>
  </header>

  <!-- Main App -->
  <main id="app" class="app-layout">
    <!-- Left Control Panel -->
    <aside id="control-panel" class="control-panel">
      <!-- Tab Buttons -->
      <div class="panel-tabs">
        <button class="tab-btn active" data-tab="mask" id="tab-mask">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          马赛克
        </button>
        <button class="tab-btn" data-tab="watermark" id="tab-watermark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
          水印
        </button>
      </div>

      <!-- Mask Panel -->
      <div class="panel-content active" id="panel-mask">
        <div class="panel-section">
          <label class="section-label">遮挡样式</label>
          <div class="style-grid">
            <button class="style-btn active" data-style="pixelate" id="style-pixelate">
              <div class="style-preview pixelate-preview"></div>
              <span>像素化</span>
            </button>
            <button class="style-btn" data-style="blur" id="style-blur">
              <div class="style-preview blur-preview"></div>
              <span>高斯模糊</span>
            </button>
            <button class="style-btn" data-style="solid" id="style-solid">
              <div class="style-preview solid-preview"></div>
              <span>纯色遮挡</span>
            </button>
          </div>
        </div>

        <!-- Pixelate Controls -->
        <div class="panel-section mask-controls" id="ctrl-pixelate">
          <label class="section-label">像素块大小</label>
          <div class="slider-row">
            <input type="range" id="pixelate-size" min="4" max="40" value="12" class="slider" />
            <span class="slider-val" id="pixelate-val">12px</span>
          </div>
        </div>

        <!-- Blur Controls -->
        <div class="panel-section mask-controls hidden" id="ctrl-blur">
          <label class="section-label">模糊半径</label>
          <div class="slider-row">
            <input type="range" id="blur-radius" min="2" max="30" value="10" class="slider" />
            <span class="slider-val" id="blur-val">10px</span>
          </div>
        </div>

        <!-- Solid Controls -->
        <div class="panel-section mask-controls hidden" id="ctrl-solid">
          <label class="section-label">遮挡颜色</label>
          <div class="color-row">
            <button class="color-btn active" data-color="#000000" style="background:#000" id="solid-black"></button>
            <button class="color-btn" data-color="#ffffff" style="background:#fff" id="solid-white"></button>
            <button class="color-btn" data-color="#e53e3e" style="background:#e53e3e" id="solid-red"></button>
          </div>
        </div>

        <div class="panel-section">
          <p class="hint">💡 在图片上拖拽鼠标绘制遮挡区域<br/>选中后可移动、缩放或按 Delete 删除</p>
        </div>
      </div>

      <!-- Watermark Panel -->
      <div class="panel-content" id="panel-watermark">
        <div class="panel-section">
          <label class="section-label">水印文字</label>
          <input type="text" id="watermark-text" class="text-input" placeholder="输入水印文字..." value="MarkMask" />
        </div>

        <div class="panel-section">
          <label class="section-label">布局模式</label>
          <div class="mode-toggle">
            <button class="mode-btn active" data-mode="single" id="mode-single">单点</button>
            <button class="mode-btn" data-mode="tiled" id="mode-tiled">平铺</button>
          </div>
        </div>

        <div class="panel-section">
          <label class="section-label">字体</label>
          <select id="watermark-font" class="select-input">
            <option value="Inter">Inter</option>
            <option value="Noto Sans SC">Noto Sans SC</option>
            <option value="Georgia">Georgia (衬线)</option>
            <option value="Courier New">Courier New (等宽)</option>
          </select>
        </div>

        <div class="panel-section">
          <label class="section-label">颜色</label>
          <div class="color-row">
            <button class="wm-color-btn" data-color="#000000" style="background:#000" id="wm-black"></button>
            <button class="wm-color-btn active" data-color="#ffffff" style="background:#fff" id="wm-white"></button>
            <button class="wm-color-btn" data-color="#999999" style="background:#999" id="wm-gray"></button>
            <input type="color" id="wm-custom-color" class="color-picker" value="#6366f1" title="自定义颜色" />
          </div>
        </div>

        <div class="panel-section">
          <label class="section-label">透明度 <span id="opacity-val">30%</span></label>
          <input type="range" id="watermark-opacity" min="0" max="100" value="30" class="slider" />
        </div>

        <div class="panel-section tiled-only">
          <label class="section-label">旋转角度 <span id="angle-val">-30°</span></label>
          <input type="range" id="watermark-angle" min="-90" max="90" value="-30" class="slider" />
        </div>

        <div class="panel-section tiled-only">
          <label class="section-label">平铺密度 <span id="density-val">中</span></label>
          <input type="range" id="watermark-density" min="1" max="5" value="3" class="slider" />
        </div>

        <div class="panel-section">
          <label class="section-label">字号 <span id="fontsize-val">24px</span></label>
          <input type="range" id="watermark-fontsize" min="12" max="72" value="24" class="slider" />
        </div>
      </div>
    </aside>

    <!-- Canvas Area -->
    <section id="canvas-area" class="canvas-area">
      <!-- Drop Zone (shown when no image loaded) -->
      <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-content">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <h3>拖放图片到此处</h3>
          <p>或</p>
          <div class="drop-actions">
            <button id="btn-open-file" class="btn btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              选择本地图片
            </button>
            <span class="drop-hint">也支持 Ctrl+V 粘贴截图</span>
          </div>
          <p class="format-hint">支持 JPG / PNG / WebP</p>
        </div>
      </div>

      <!-- Fabric Canvas Container -->
      <div id="canvas-container" class="canvas-container hidden">
        <canvas id="fabric-canvas"></canvas>
      </div>

      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" class="hidden-input" />
    </section>
  </main>

  <!-- Bottom Action Bar -->
  <footer id="action-bar" class="action-bar">
    <div class="action-group action-left">
      <button id="btn-new" class="btn btn-ghost" title="导入新图片" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新图片
      </button>
    </div>
    <div class="action-group action-center">
      <button id="btn-undo" class="btn btn-ghost" title="撤销 (Ctrl+Z)" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        撤销
      </button>
      <button id="btn-redo" class="btn btn-ghost" title="重做 (Ctrl+Y)" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
        重做
      </button>
    </div>
    <div class="action-group action-right">
      <button id="btn-copy" class="btn btn-ghost" title="复制到剪贴板" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        复制
      </button>
      <button id="btn-download" class="btn btn-primary" title="下载图片" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载图片
      </button>
    </div>
  </footer>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
